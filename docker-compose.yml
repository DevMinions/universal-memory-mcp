services:
  universal-memory:
    build: .
    container_name: universal-memory-mcp
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - MCP_MODE=http
      - MCP_PORT=3100
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_CONFIG_PATH=/app/config.json
    volumes:
      - ./config.json:/app/config.json:ro
      - ${HOME}/.openclaw/memory/lancedb-pro:/data/lancedb-pro
      - ./backups:/data/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
